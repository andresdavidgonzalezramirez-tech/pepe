version: '3.9'

services:
  app:
    build: .
    container_name: vankenban-app
    # El comando utiliza variables de entorno con valores por defecto
    command: >
      sh -c "python -m app.database.migrations && 
             uvicorn app.main:app --host $${APP_HOST:-0.0.0.0} --port $${APP_PORT:-8000}"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./vankenban.db
      - POSTGRES_PARTITION_RANGE_SIZE=1000000
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - PYTHONUNBUFFERED=1
    volumes:
      # Persistencia para la base de datos SQLite
      - ./vankenban.db:/app/vankenban.db
    restart: unless-stopped